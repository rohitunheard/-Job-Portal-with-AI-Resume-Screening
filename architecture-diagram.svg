<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="frontend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="backend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="database" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="external" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="auth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-right" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-right-cyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06b6d4"/>
    </marker>
    <marker id="arrow-right-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1100" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="800" y="50" text-anchor="middle" fill="#e2e8f0" font-size="28" font-weight="bold" filter="url(#glow)">Job Portal — System Architecture Diagram</text>
  <text x="800" y="75" text-anchor="middle" fill="#64748b" font-size="14">AI-Powered Resume Screening Platform</text>

  <!-- ============================================================ -->
  <!-- LAYER 1: FRONTEND (React + Vite) -->
  <!-- ============================================================ -->
  <rect x="40" y="110" width="720" height="360" rx="16" fill="#1e293b" stroke="#6366f1" stroke-width="2" stroke-opacity="0.5" filter="url(#shadow)"/>
  <text x="60" y="140" fill="#a5b4fc" font-size="16" font-weight="bold">PRESENTATION LAYER</text>
  <text x="60" y="158" fill="#64748b" font-size="11">React 19 + Vite 8 + Tailwind CSS — Port 5173</text>

  <!-- Frontend components -->
  <rect x="60" y="175" width="210" height="44" rx="10" fill="url(#frontend)" opacity="0.9" filter="url(#shadow)"/>
  <text x="165" y="202" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🧭 React Router SPA</text>

  <rect x="290" y="175" width="210" height="44" rx="10" fill="url(#frontend)" opacity="0.9" filter="url(#shadow)"/>
  <text x="395" y="202" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🔐 Auth (JWT + OTP)</text>

  <rect x="520" y="175" width="220" height="44" rx="10" fill="url(#frontend)" opacity="0.9" filter="url(#shadow)"/>
  <text x="630" y="202" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">📄 Pages x12</text>

  <!-- Page components -->
  <rect x="60" y="235" width="155" height="36" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="137" y="257" text-anchor="middle" fill="#cbd5e1" font-size="11">🏠 Home</text>

  <rect x="230" y="235" width="155" height="36" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="307" y="257" text-anchor="middle" fill="#cbd5e1" font-size="11">💼 Jobs</text>

  <rect x="400" y="235" width="155" height="36" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="477" y="257" text-anchor="middle" fill="#cbd5e1" font-size="11">👤 Profile</text>

  <rect x="570" y="235" width="170" height="36" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="655" y="257" text-anchor="middle" fill="#cbd5e1" font-size="11">🔍 Found Jobs</text>

  <rect x="60" y="285" width="155" height="36" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="137" y="307" text-anchor="middle" fill="#cbd5e1" font-size="11">📝 Apply Now</text>

  <rect x="230" y="285" width="155" height="36" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="307" y="307" text-anchor="middle" fill="#cbd5e1" font-size="11">👥 About Us</text>

  <rect x="400" y="285" width="155" height="36" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="477" y="307" text-anchor="middle" fill="#cbd5e1" font-size="11">📊 Admin Panel</text>

  <rect x="570" y="285" width="170" height="36" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="655" y="307" text-anchor="middle" fill="#cbd5e1" font-size="11">🏢 Employer Dash</text>

  <rect x="60" y="335" width="155" height="36" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="137" y="357" text-anchor="middle" fill="#cbd5e1" font-size="11">🔐 Admin Login</text>

  <rect x="230" y="335" width="155" height="36" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="307" y="357" text-anchor="middle" fill="#cbd5e1" font-size="11">🧑‍💼 Employer Login</text>

  <rect x="400" y="335" width="155" height="36" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="477" y="357" text-anchor="middle" fill="#cbd5e1" font-size="11">🏪 Employer Profile</text>

  <rect x="570" y="335" width="170" height="36" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="655" y="357" text-anchor="middle" fill="#cbd5e1" font-size="11">🤖 Resume Screener</text>

  <!-- Shared layout components -->
  <rect x="60" y="390" width="320" height="36" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
  <text x="220" y="412" text-anchor="middle" fill="#a5b4fc" font-size="11">📍 Navbar (Sticky + Dropdown) + Footer</text>

  <rect x="400" y="390" width="340" height="36" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
  <text x="570" y="412" text-anchor="middle" fill="#a5b4fc" font-size="11">🔧 Utils: auth.js (Token Management)</text>

  <!-- ============================================================ -->
  <!-- LAYER 2: BACKEND (Express API) -->
  <!-- ============================================================ -->
  <rect x="840" y="110" width="720" height="680" rx="16" fill="#1e293b" stroke="#06b6d4" stroke-width="2" stroke-opacity="0.5" filter="url(#shadow)"/>
  <text x="860" y="140" fill="#67e8f9" font-size="16" font-weight="bold">API & SERVICE LAYER</text>
  <text x="860" y="158" fill="#64748b" font-size="11">Express 5 + Node.js — Port 5000</text>

  <!-- Middleware section -->
  <rect x="860" y="175" width="680" height="44" rx="10" fill="#164e63" stroke="#0891b2" stroke-width="1" filter="url(#shadow)"/>
  <text x="1050" y="202" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="bold">🛡️ MIDDLEWARE STACK</text>
  <text x="1430" y="202" text-anchor="middle" fill="#5eead4" font-size="11">CORS · JSON Body Parser · Static /uploads</text>

  <!-- Routes -->
  <rect x="860" y="235" width="680" height="260" rx="12" fill="#0f172a" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="880" y="250" width="310" height="44" rx="10" fill="url(#backend)" opacity="0.85" filter="url(#shadow)"/>
  <text x="1035" y="277" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">👤 /api/userinfo</text>

  <rect x="1210" y="250" width="310" height="44" rx="10" fill="url(#backend)" opacity="0.85" filter="url(#shadow)"/>
  <text x="1365" y="277" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">📄 /api/userresume</text>

  <rect x="880" y="305" width="310" height="44" rx="10" fill="url(#backend)" opacity="0.85" filter="url(#shadow)"/>
  <text x="1035" y="332" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">🔐 /api/userlogininfo</text>

  <rect x="1210" y="305" width="310" height="44" rx="10" fill="url(#backend)" opacity="0.85" filter="url(#shadow)"/>
  <text x="1365" y="332" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">📋 /api/jobapplications</text>

  <rect x="880" y="360" width="310" height="44" rx="10" fill="url(#backend)" opacity="0.85" filter="url(#shadow)"/>
  <text x="1035" y="387" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">🏢 /api/employer</text>

  <rect x="1210" y="360" width="310" height="44" rx="10" fill="url(#backend)" opacity="0.85" filter="url(#shadow)"/>
  <text x="1365" y="387" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">📌 /api/jobpostings</text>

  <rect x="880" y="415" width="310" height="44" rx="10" fill="url(#backend)" opacity="0.85" filter="url(#shadow)"/>
  <text x="1035" y="442" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">🛡️ /api/admin</text>

  <rect x="1210" y="415" width="310" height="44" rx="10" fill="url(#backend)" opacity="0.85" filter="url(#shadow)"/>
  <text x="1365" y="442" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">🤖 /api/resume-screen</text>

  <!-- Auth middleware module -->
  <rect x="860" y="510" width="680" height="55" rx="10" fill="url(#auth)" opacity="0.8" filter="url(#shadow)"/>
  <text x="1050" y="536" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🔑 AUTH MIDDLEWARE (JWT Verification)</text>
  <text x="1050" y="554" text-anchor="middle" fill="#fbcfe8" font-size="11">authUser (role: user) · authEmployer (role: employer) · authAdmin (role: admin) · authAny</text>

  <!-- Utils section -->
  <rect x="860" y="580" width="680" height="100" rx="12" fill="#0f172a" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1200" y="600" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="bold">⚙️ UTILITIES & SERVICES</text>

  <rect x="880" y="615" width="200" height="44" rx="8" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="980" y="642" text-anchor="middle" fill="#fcd34d" font-size="11">📧 mailer.js (Nodemailer)</text>

  <rect x="1100" y="615" width="200" height="44" rx="8" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="1200" y="642" text-anchor="middle" fill="#86efac" font-size="11">🔢 otp.js (crypto SHA-256)</text>

  <rect x="1320" y="615" width="200" height="44" rx="8" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="1"/>
  <text x="1420" y="642" text-anchor="middle" fill="#d8b4fe" font-size="11">🧠 resumeScreening.js</text>

  <!-- ============================================================ -->
  <!-- LAYER 3: DATA & EXTERNAL -->
  <!-- ============================================================ -->
  <rect x="40" y="500" width="720" height="290" rx="16" fill="#1e293b" stroke="#22c55e" stroke-width="2" stroke-opacity="0.5" filter="url(#shadow)"/>
  <text x="60" y="530" fill="#86efac" font-size="16" font-weight="bold">DATA LAYER</text>
  <text x="60" y="548" fill="#64748b" font-size="11">MongoDB (Mongoose ODM) · File Storage</text>

  <!-- MongoDB section -->
  <rect x="60" y="565" width="320" height="44" rx="10" fill="url(#database)" opacity="0.9" filter="url(#shadow)"/>
  <text x="220" y="592" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🍃 MongoDB Atlas (Mongoose)</text>

  <!-- Models -->
  <rect x="60" y="625" width="155" height="36" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="137" y="647" text-anchor="middle" fill="#bbf7d0" font-size="10">Useraccount</text>

  <rect x="230" y="625" width="155" height="36" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="307" y="647" text-anchor="middle" fill="#bbf7d0" font-size="10">Userresume</text>

  <rect x="60" y="673" width="155" height="36" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="137" y="695" text-anchor="middle" fill="#bbf7d0" font-size="10">Userinfo</text>

  <rect x="230" y="673" width="155" height="36" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="307" y="695" text-anchor="middle" fill="#bbf7d0" font-size="10">Userlogininfo</text>

  <rect x="60" y="721" width="155" height="36" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="137" y="743" text-anchor="middle" fill="#bbf7d0" font-size="10">Jobposting</text>

  <rect x="230" y="721" width="155" height="36" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="307" y="743" text-anchor="middle" fill="#bbf7d0" font-size="10">Jobapplication</text>

  <rect x="60" y="769" width="155" height="36" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="137" y="791" text-anchor="middle" fill="#bbf7d0" font-size="10">Employer</text>

  <rect x="230" y="769" width="155" height="36" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="307" y="791" text-anchor="middle" fill="#bbf7d0" font-size="10">Admin</text>

  <!-- File Storage -->
  <rect x="420" y="565" width="320" height="44" rx="10" fill="url(#storage)" opacity="0.9" filter="url(#shadow)"/>
  <text x="580" y="592" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">💾 Local File Storage</text>

  <rect x="420" y="625" width="320" height="36" rx="8" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="580" y="647" text-anchor="middle" fill="#e9d5ff" font-size="11">📁 /backend/uploads/</text>

  <rect x="420" y="673" width="320" height="36" rx="8" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="580" y="695" text-anchor="middle" fill="#e9d5ff" font-size="11">📄 Resume PDFs · 🖼️ Profile Pics</text>

  <!-- ============================================================ -->
  <!-- EXTERNAL SERVICES LAYER -->
  <!-- ============================================================ -->
  <rect x="40" y="820" width="1520" height="115" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.5" filter="url(#shadow)"/>
  <text x="60" y="850" fill="#fcd34d" font-size="16" font-weight="bold">EXTERNAL SERVICES</text>

  <rect x="60" y="870" width="220" height="44" rx="10" fill="url(#external)" opacity="0.85" filter="url(#shadow)"/>
  <text x="170" y="897" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">🤖 OpenAI (GPT-4o-mini)</text>

  <rect x="310" y="870" width="200" height="44" rx="10" fill="url(#external)" opacity="0.85" filter="url(#shadow)"/>
  <text x="410" y="897" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">📧 SMTP Mail Server</text>

  <rect x="540" y="870" width="200" height="44" rx="10" fill="url(#external)" opacity="0.85" filter="url(#shadow)"/>
  <text x="640" y="897" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">☁️ MongoDB Atlas</text>

  <!-- ============================================================ -->
  <!-- ARROWS: DATA FLOW -->
  <!-- ============================================================ -->

  <!-- Frontend → Backend -->
  <line x1="760" y1="290" x2="835" y2="290" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow-right)"/>
  <text x="798" y="280" text-anchor="middle" fill="#64748b" font-size="9" transform="rotate(-90,798,280)">HTTP Requests</text>

  <!-- Backend → MongoDB -->
  <line x1="840" y1="640" x2="765" y2="640" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-right-green)"/>
  <text x="800" y="630" text-anchor="middle" fill="#22c55e" font-size="9">Mongoose ODM</text>

  <!-- Backend → OpenAI -->
  <line x1="1200" y1="700" x2="1200" y2="865" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-right)"/>
  <text x="1210" y="810" fill="#f59e0b" font-size="9">API Key Auth</text>

  <!-- Backend → SMTP -->
  <line x1="1350" y1="650" x2="1350" y2="865" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-right)"/>
  <text x="1330" y="765" fill="#f59e0b" font-size="9">OTP Emails</text>

  <!-- Backend → File Storage -->
  <line x1="900" y1="555" x2="780" y2="555" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-right)"/>
  <text x="830" y="547" fill="#a855f7" font-size="9">Multer Upload</text>

  <!-- User types (Top bar) -->
  <rect x="40" y="960" width="1520" height="115" rx="16" fill="#1e293b" stroke="#6366f1" stroke-width="2" stroke-opacity="0.3" filter="url(#shadow)"/>
  <text x="60" y="990" fill="#a5b4fc" font-size="16" font-weight="bold">USER TYPES & AUTH FLOW</text>

  <!-- Job Seeker -->
  <rect x="60" y="1008" width="470" height="50" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="80" y="1030" fill="#a5b4fc" font-size="13" font-weight="bold">👤 Job Seeker</text>
  <text x="80" y="1048" fill="#94a3b8" font-size="11">Signup → Login (password) → OTP email → JWT → Browse Jobs → Apply → Upload Resume</text>

  <!-- Employer -->
  <rect x="565" y="1008" width="470" height="50" rx="10" fill="#312e81" stroke="#a855f7" stroke-width="1.5"/>
  <text x="585" y="1030" fill="#d8b4fe" font-size="13" font-weight="bold">🏢 Employer</text>
  <text x="585" y="1048" fill="#94a3b8" font-size="11">Signup → Login (password) → OTP email → JWT → Post Jobs → AI Screen → Manage Status</text>

  <!-- Admin -->
  <rect x="1070" y="1008" width="470" height="50" rx="10" fill="#312e81" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1090" y="1030" fill="#fcd34d" font-size="13" font-weight="bold">🛡️ Admin</text>
  <text x="1090" y="1048" fill="#94a3b8" font-size="11">Direct Login (username/password) → JWT → View Apps/Profiles/Users → Bulk AI Screening</text>

</svg>